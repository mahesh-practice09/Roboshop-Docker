services:

  catalogue:
    build:
      context: ./catalogue
      dockerfile: catalogue.Dockerfile
    image: mahesh050917/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

  user:
    build:
      context: ./user
      dockerfile: user.Dockerfile
    image: mahesh050917/user:1.0.0
    container_name: user
    depends_on:
      - redis
      - mongodb

  cart:
    build:
      context: ./cart
      dockerfile: cart.Dockerfile
    image: mahesh050917/cart:1.0.0
    container_name: cart

  mongodb:
    build:
      context: ./mongodb
      dockerfile: mongodb.Dockerfile
    image: mahesh050917/mongodb:1.0.0
    container_name: mongodb

  redis:
    build:
      context: ./redis
      dockerfile: redis.Dockerfile
    image: mahesh050917/redis:1.0.0
    container_name: redis

networks:
  default:
    driver: bridge
    name: roboshop