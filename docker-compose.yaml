services:

  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: mahesh050917/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    image: mahesh050917/user:1.0.0
    container_name: user
    depends_on:
      - redis
      - mongodb

  cart:
    build:
      context: ./cart
      dockerfile: Dockerfile
    image: mahesh050917/cart:1.0.0
    container_name: cart
    depends_on:
      - catalogue
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile 
    image: mahesh050917/frontend:1.0.0
    container_name: frontend
    ports: 
     - "80:80"
    depends_on:
      - catalogue
      - cart
      - user
      - shipping
      - payment
  
  shipping:
    build: 
     context: ./shipping 
     dockerfile: Dockerfile 
    image: mahesh050917/shipping:1.0.0
    container_name: shipping
    depends_on:
      - mysql
      - cart

  payment:
    build: 
     context: ./payment 
     dockerfile: Dockerfile 
    image: mahesh050917/payment:1.0.0
    container_name: payment
    depends_on:
      - rabbitmq
      - cart
      - user
  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: mahesh050917/mongodb:1.0.0
    container_name: mongodb
  
  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    image: redis:7.0            # as there is no change in image we are building image from compose yaml file
    container_name: redis

  mysql:
   build:
     context: ./mysql 
     dockerfile: Dockerfile
   image: mahesh050917/mysql:1.0.0 
   container_name: mysql
  
  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: roboshop 
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq

networks:
  default:
    driver: bridge
    name: roboshop